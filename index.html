    <section class="hero"><div class="hero-card"><span class="rings" aria-hidden="true"></span><p class="eyebrow">一念 · 一观 · 一步</p><h1>先照见眼前这一念，<br>再决定下一步。</h1><p class="lead">写下此刻的困扰，离线规则会从三十七道品中找到适合先练的一至三项。</p><div class="privacy"><span class="dot"></span><span>内容只在当前设备处理，不上传、不联网、不调用模型 API</span></div></div></section>

  (()=>{
    "use strict";
    const factorDoc={"version":"1.0","count":37,"factors":[{"id":"four_mindfulness.1","group_id":"four_mindfulness","order":1,"name_zh":"身念处","pali":"kāyānupassanā-satipaṭṭhāna","aliases_zh":[],"plain_meaning":"如实觉察呼吸、姿势、动作与身体状态。","when_to_use":["生气前身体紧绷","焦虑时呼吸急促","冲动和习惯动作","疲劳却硬撑"],"why_it_helps":"身体常比语言更早显出情绪和冲动；先觉察身体，可以在自动反应之前多出一点空间。","practice_now":["停十秒，不改变呼吸，只知道呼吸快慢。","依次感受脸、肩、胸、腹。","用一句事实描述：‘肩膀紧，呼吸浅。’"],"deep_points":["经典中的身念处还包括行住坐卧、正知、身体组成、四界和不净观等。","日常练习只是入口，不能代替完整禅修指导。"],"misconceptions":["不是厌恶身体。","不是强迫身体立刻放松。","不等于只做身体扫描。"],"source_ids":["MA98","MN10","DN22","SN47"],"tags":["身体","呼吸","紧张","冲动","当下"],"review_status":"source_checked"},{"id":"four_mindfulness.2","group_id":"four_mindfulness","order":2,"name_zh":"受念处","pali":"vedanānupassanā-satipaṭṭhāna","aliases_zh":[],"plain_meaning":"觉察经验中的乐受、苦受与不苦不乐受。","when_to_use":["被批评后难受","追求舒服而上瘾","逃避不舒服","情绪刚出现"],"why_it_helps":"把感受和对事情的解释分开，能减少立刻追逐、排斥或反击。","practice_now":["问：此刻偏舒服、不舒服，还是中性？","只标记‘苦受正在出现’，先不解释原因。","观察它是否变化。"],"deep_points":["受是经验的感受色彩，不等同于完整情绪。","可进一步观察世俗/非世俗、有染/离染等分类，但 MVP 不必展开。"],"misconceptions":["不是否认真实伤害。","不是要求自己没有感觉。","感觉真实，不表示由感觉得出的判断必然正确。"],"source_ids":["MA98","MN10","DN22","SN47"],"tags":["感受","委屈","舒服","不舒服","冲动"],"review_status":"source_checked"},{"id":"four_mindfulness.3","group_id":"four_mindfulness","order":3,"name_zh":"心念处","pali":"cittānupassanā-satipaṭṭhāna","aliases_zh":[],"plain_meaning":"知道当前的心是否有贪、嗔、痴、散乱、收摄、安定等状态。","when_to_use":["嫉妒","愤怒","贪求","恐惧","散乱","修行懈怠"],"why_it_helps":"从‘我就是愤怒’转为‘嗔心正在出现’，有助于不把暂时状态当成固定自我。","practice_now":["问：现在是什么心？","用一个不羞辱自己的词标记：嗔、贪、怕、散乱。","不急着处理，先看它怎样变化。"],"deep_points":["经典列举有贪/离贪、有嗔/离嗔、有痴/离痴等成对状态。","心念处不是心理诊断。"],"misconceptions":["不是把自己贴成坏人。","不是纵容不善心。","不是用积极想法覆盖真实状态。"],"source_ids":["MA98","MN10","DN22","SN47"],"tags":["愤怒","嫉妒","贪心","恐惧","散乱"],"review_status":"source_checked"},{"id":"four_mindfulness.4","group_id":"four_mindfulness","order":4,"name_zh":"法念处","pali":"dhammānupassanā-satipaṭṭhāna","aliases_zh":[],"plain_meaning":"观察哪些法正在使心受障碍 d":"seven_factors","order":7,"name_zh":"舍觉支","pali":"upekkhāsambojjhaṅga","aliases_zh":[],"plain_meaning":"在清楚觉察中保持平衡，不偏向贪取或排斥。","when_to_use":["得失心强","被赞毁牵动","情绪过度兴奋或低落"],"why_it_helps":"舍使心不因喜欢和讨厌失去如实观察。","practice_now":["承认喜欢或不喜欢。","暂不依据它作决定。","看事物如何变化。"],"deep_points":["舍含平衡与不偏，不是没有慈悲。"],"misconceptions":["不是冷漠。","不是放弃行动。"],"source_ids":["SN46_17","MN10","DN22"],"tags":["觉悟","平衡","修心"],"review_status":"source_checked"},{"id":"eightfold_path.1","group_id":"eightfold_path","order":1,"name_zh":"正见","pali":"sammādiṭṭhi","aliases_zh":[],"plain_meaning":"以四圣谛、业果与离苦方向如实理解经验。","when_to_use":["观点极端","做决定","把感受当事实","不知道什么是正确方向"],"why_it_helps":"看法会引导动机、语言和行为；方向偏了，越努力可能越烦恼。","practice_now":["写下事实、推测和愿望。","问：这个选择会增加还是减少贪嗔痴？","把问题放回苦、苦因、止息与道路来观察。"],"deep_points":["正见不能简化为正能量或换角度。"],"misconceptions":["不是自认拥有唯一正确观点。"],"source_ids":["SN45_8","MN117","SN56_11"],"tags":["八正道","伦理","禅修","智慧"],"review_status":"source_checked"},{"id":"eightfold_path.2","group_id":"eightfold_path","order":2,"name_zh":"正思惟","pali":"sammāsaṅkappa","aliases_zh":[],"plain_meaning":"培养离欲、无嗔与不害的意向。","when_to_use":["报复冲动","嫉妒","关系冲突","欲望拉扯"],"why_it_helps":"行动之前先检查动机，能减少以善名包装伤害。","practice_now":["问：我现在的目的是什么？","把‘我要赢’改为‘我要解决并减少伤害’。","选择一个不伤害的下一步。"],"deep_points":["也译正志、正思。核心不只是积极思考。"],"misconceptions":["不是压住合理边界。"],"source_ids":["SN45_8","MN117","SN56_11"],"tags":["八正道","伦理","禅修","智慧"],"review_status":"source_checked"},{"id":"eightfold_path.3","group_id":"eightfold_path","order":3,"name_zh":"正语","pali":"sammāvācā","aliases_zh":[],"plain_meaning":"远离妄语、离间语、粗恶语和无益杂语，培养真实、和合、柔和、适时的语言。","when_to_use":["吵架","反馈员工","家庭沟通","网络发言"],"why_it_helps":"语言能直接扩大或减少苦。","practice_now":["说前检查：真实？有益？合时？","只说可核实事实，不猜动机。","情绪太强时先延后。"],"deep_points":["正语不仅是好听，也包括真实和时机。"],"misconceptions":["不是永远沉默。","不是讨好。"],"source_ids":["SN45_8","MN117","SN56_11"],"tags":["八正道","伦理","禅修","智慧"],"review_status":"source_checked"},{"id":"eightfold_path.4","group_id":"eightfold_path","order":4,"name_zh":"正业","pali":"sammākammanta","aliases_zh":[],"p 进、心、观与定及努力的结合。","supports":["四如意足"],"verification_notes":"中文名称在不同传统中可能译为欲、勤、心、观或欲、精进、心、思惟。"},{"id":"SN48_9","type":"primary","title":"SN 48.9 五根分别","canonical_ref":"Saṃyutta Nikāya 48.9","url":"https://suttacentral.net/sn48.9","authority_note":"列出并解释信、精进、念、定、慧五根。","supports":["五根"],"verification_notes":"不要把信根简化为一般自信。"},{"id":"SN50_9","type":"primary","title":"SN 50.9 五力总说","canonical_ref":"Saṃyutta Nikāya 50.9","url":"https://suttacentral.net/sn50.9","authority_note":"列出信、精进、念、定、慧五力。","supports":["五力"],"verification_notes":"五根与五力项目相同，但功能语境不同。"},{"id":"SN46_17","type":"primary","title":"SN 46.17 七觉支总说","canonical_ref":"Saṃyutta Nikāya 46.17","url":"https://suttacentral.net/sn46.17","authority_note":"列出念、择法、精进、喜、轻安、定、舍七觉支。","supports":["七觉支"],"verification_notes":"进一步谈平衡可补查 SN46 其他单经。"},{"id":"SN45_8","type":"primary","title":"SN 45.8 八正道分别","canonical_ref":"Saṃyutta Nikāya 45.8","url":"https://suttacentral.net/sn45.8","authority_note":"逐项解释八正道。","supports":["正见","正思惟","正语","正业","正命","正精进","正念","正定"],"verification_notes":"正定在此有具体禅那定义。"},{"id":"MN117","type":"primary","title":"MN 117 Mahācattārīsaka Sutta《大四十经》","canonical_ref":"Majjhima Nikāya 117","url":"https://suttacentral.net/mn117","authority_note":"深入说明正见及八正道各支的关系与层次。","supports":["八正道深入解释","世间与出世间语境"],"verification_notes":"深入模式适用，简易模式不宜一次展开全部层次。"},{"id":"SN56_11","type":"primary","title":"SN 56.11 Dhammacakkappavattana Sutta《转法轮经》","canonical_ref":"Saṃyutta Nikāya 56.11","url":"https://suttacentral.net/sn56.11","authority_note":"四圣谛与八正道的核心来源。","supports":["正见的四谛背景","八正道是苦灭之道"],"verification_notes":"用于避免把八正道简化为一般人生技巧。"},{"id":"DN16","type":"primary","title":"DN 16 Mahāparinibbāna Sutta《大般涅槃经》","canonical_ref":"Dīgha Nikāya 16","url":"https://suttacentral.net/dn16","authority_note":"包含佛陀晚年对修学法与八正道的重要教导。","supports":["八正道重要性","修学总背景"],"verification_notes":"如需支持完整七组列举，应在具体段落人工复核后再作直接引文。"}]};
    const factors=factorDoc.factors,rules=ruleDoc.rules,ranking=ruleDoc.ranking_rules,sources=sourceDoc.sources;
    const factorById=new Map(factors.map(x=>[x.id,x]));
    const sourceById=new Map(sources.map(x=>[x.id,x]));
    const groupLabels={four_mindfulness:"四念处",four_efforts:"四正勤",four_iddhipada:"四如意足",five_faculties:"五根",five_powers:"五力",seven_factors:"七觉支",eightfold_path:"八正道"};
    const tagSummaries={anger:"被触发后的不舒服、嗔心和立刻反驳的冲动",criticism:"被评价后的难受，以及对自己或对方的判断",anxiety:"对未来的担心与身体、念头上的紧绷",procrastination:"想开始行动与想逃开、刷手机之间的拉扯",jealousy:"看见比较后出现的不舒服与攀比的心",relationship_conflict:"关系中的受伤感、动机和说话方式",decision:"事实、推测与要作出选择之间的拉扯",practice_sloth:"修行中的退心或难以持续",restlessness:"心散乱、反复思量而不易安住",ethical_work:"现实利益与不伤害原则之间的取舍",praise_blame:"被赞毁、得失牵动时的起伏"};
    const urgent=[{category:"self_harm",pattern:/自杀|自傷|自伤|不想活|结束自己|结束生命|活不下去|想好怎么做|割腕|跳楼|服药自尽/i,title:"此刻请先把安全放在第一位"},{category:"violence",pattern:/要杀(了|死)|杀人|伤害他人|拿刀|打死|威胁.*(打|杀)|家暴|伴侣.*打我|暴力/i,title:"此刻请先离开或降低现实危险"}];
    const high=[{category:"medical",pattern:/急性|胸痛|呼吸困难|昏迷|用药|药量|停药|副作用|高烧|出血/i,title:"这需要优先获得医疗专业支持"},{category:"mental_health",pattern:/幻听|幻觉|完全睡不着|无法维持生活|不能工作|无法照顾自己|严重抑郁|精神崩溃/i,title:"这需要优先获得现实支持与专业评估"},{category:"legal_financial",pattern:/被起诉|违法|诈骗|投资.*全部|all.?in|赌博|巨额欠债|破产/i,title:"这需要优先暂停高风险行动并寻求专业协助"}];
    const q=document.querySelector("#question"),error=document.querySelector("#error"),result=document.querySelector("#result");
    const escapeHtml=s=>String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    const unique=a=>[...new Set(a)];
    const normalize=s=>s.toLowerCase().replace(/[\s，。、“”‘’！？；：,.!?;:()（）]/g,"");
    function detectSafety(input){for(const x of urgent)if(x.pattern.test(input))return{...x,level:"urgent"};for(const x of high)if(x.pattern.test(input))return{...x,level:"high"};return{level:"none"}}
    function safetySteps(category){if(category==="self_harm")return["请立刻联系身边可信任的人，直接告诉对方你现在需要陪伴和协助。","若已有立即伤害自己的风险，请拨打当地紧急服务；在中国可拨打 120 或 110，或前往最近急诊。","尽量不要独处，先远离可能用来伤害自己的物品，并到有人的安全地点。","在等待支持时，若这样做不会增加风险，只需感受双脚踩地和周围三样可见物；这只是辅助安定，不替代求助。"];if(category==="violence")return["优先离开可能发生暴力的环境，去有其他人在的安全地点。","联系可信任的亲友、当地紧急服务或反家暴支持机构；如有即时危险，在中国可拨打 110。","不要把忍辱理解为必须承受暴力或放弃求助。","在安全得到保障后，才可以把短暂觉察作为辅助安定，而不是替代现实保护。"];if(category==="medical")return["请优先联系医生、药师、急救服务或前往医疗机构，不要自行调整处方或用药剂量。","若症状正在加重或存在紧急危险，请立即寻求急救。","佛法练习只可作为等待专业帮助时的辅助安定，不替代医疗判断。"];if(category==="mental_health")return["请尽快联系可信任的人、心理健康专业人员或当地医疗服务，并说明你目前难以维持基本生活。","若有即时自伤或伤人风险，请直接联系当地紧急服务。","短暂觉察或呼吸练习只能作为辅助，不是对严重症状的治疗。"];return["先暂停可能造成重大损失或法律后果的行动，不要在慌乱中签字、转账或对外承诺。","尽快联系合格的法律、财务或相关专业人士，并保留必要记录。","佛法练习可帮助安住和检视动机，但不替代现实专业意见。"]}
    function classify(input){const n=normalize(input);return rules.filter(r=>r.keywords.some(k=>n.includes(normalize(k)))||(r.id==="procrastination"&&[/手机.*刷/,/刷.*手机/,/一拿.*手机/].some(p=>p.test(n)))).map(r=>r.id)}
    function rank(tags,max=ranking.max_simple_factors){const scores=new Map;for(const r of rules){if(!tags.includes(r.id))continue;for(const [id,w] of Object.entries(r.factor_weights))scores.set(id,(scores.get(id)||0)+w)}const ranked=[...scores].filter(([,s])=>s>=ranking.minimum_score).map(([id,score])=>({factor:factorById.get(id),score})).filter(x=>x.factor).sort((a,b)=>b.score-a.score||a.factor.order-b.factor.order);if(!ranked.length)return ranking.fallback_factor_ids.map(id=>factorById.get(id)).filter(Boolean).slice(0,max);const selected=[],groups=new Set;for(const {factor} of ranked){if(selected.length>=max)break;if(ranking.prefer_diversity_across_groups&&groups.has(factor.group_id))continue;selected.push(factor);groups.add(factor.group_id)}for(const {factor} of ranked){if(selected.length>=max)break;if(!selected.some(x=>x.id===factor.id))selected.push(factor)}return selected}
    function summary(tags){const seen=tags.map(t=>tagSummaries[t]).filter(Boolean).slice(0,2);return seen.length?`依据你的描述，眼前可能同时有${seen.join("，也有")}。可以先把事实、感受、判断和行动冲动分开看；仅凭这些信息，暂不推断他人的动机。`:"依据你的描述，可以先把已经发生的事、当下的身心感受、脑中的判断和下一步冲动分开看。暂不急着给自己或他人下结论。"}
    function basis(selected,sourceIds){const refs=sourceIds.map(id=>sourceById.get(id)).filter(Boolean).map(s=>s.canonical_ref).join("、");const meanings=selected.map(f=>`${f.name_zh}强调${f.plain_meaning.replace(/[。；]+$/u,"")}`).join("；");return`【经文原意的转述】依据 ${refs} 所支持的相关修习内容，可以这样理解：${meanings}。这里没有使用未经逐字核验的引文。`}
    function makeAnswer(input){const safe=detectSafety(input);if(safe.level!=="none")return{kind:"safety",safety:safe,situationSummary:"我听到你提到的情况可能涉及现实危险或需要专业支持。此刻最优先的不是独自处理情绪或修行问题，而是让自己和相关的人先获得安全、医疗或专业协助。",factors:[],practiceSteps:safetySteps(safe.category),buddhistBasis:"佛法练习可以在安全得到保障后作为辅助安定，但不替代紧急服务、医疗、心理健康、法律或财务专业处理。",sourceIds:[],input};const tags=classify(input),selected=rank(tags),sourceIds=unique(selected.flatMap(f=>f.source_ids)).slice(0,3);return{kind:"normal",tags,selected,situationSummary:summary(tags),factors:selected,practiceSteps:selected.flatMap(f=>f.practice_now).slice(0,5),buddhistBasis:basis(selected,sourceIds),sourceIds,input}}
    function practiceHtml(steps,safety=false){return`<section class="practice"><h2>${safety?"请先这样做":"现在这样练"}</h2><ol>${steps.map((s,i)=>`<li><span class="num">${i+1}</span><span>${escapeHtml(s)}</span></li>`).join("")}</ol></section>`}
    function sourceHtml(ids){if(!ids.length)return"";return`<details class="sources"><summary>展开查看经典来源</summary>${ids.map(id=>sourceById.get(id)).filter(Boolean).map(s=>`<article class="source"><p class="section-label">${s.type==="primary"?"早期经典":"核查数据库"}</p><h3>${escapeHtml(s.title)}</h3><p class="source-meta">${escapeHtml(s.canonical_ref)}</p><p>支持：${escapeHtml(s.supports.join("、"))}</p><p>核查说明：${escapeHtml(s.verification_notes)}</p></article>`).join("")}</details>`}
    function deepHtml(answer){const selected=answer.selected;const sourceNames=unique(selected.flatMap(f=>f.source_ids)).map(id=>sourceById.get(id)).filter(Boolean).map(s=>`${s.title}（${s.canonical_ref}）`).join("；");const sections=[{title:"这个困扰可以怎样观察",content:`原始困扰：${answer.input}\n\n${answer.situationSummary}`},{title:"道品如何配合",content:selected.map((f,i)=>`${i+1}. ${f.name_zh}（${groupLabels[f.group_id]}）：${f.why_it_helps}`).join("\n")},{title:"【经文原意】",content:selected.map(f=>`- ${f.name_zh}：依据相关来源，可转述为${f.deep_points.join("；")}`).join("\n")+"\n\n以上是依据知识库来源的忠实转述，不是佛陀原话或直接引文。"},{title:"【容易误解】",content:selected.map(f=>`- ${f.name_zh}：${f.misconceptions.join("；")}`).join("\n")},{title:"【经典来源】",content:sourceNames}];return`<div class="deep-wrap">${sections.map(s=>`<section class="deep"><h3>${escapeHtml(s.title)}</h3><p>${escapeHtml(s.content)}</p></section>`).join("")}</div>`}
    function render(answer){if(answer.kind==="safety"){result.innerHTML=`<section class="safety"><p class="summary-label">安全优先</p><h2>${escapeHtml(answer.safety.title)}</h2><p class="lead">${escapeHtml(answer.situationSummary)}</p></section>${practiceHtml(answer.practiceSteps,true)}<section class="basis"><h2>说明</h2><p>${escapeHtml(answer.buddhistBasis)}</p></section><p class="disclaimer">提示：本工具不能处理紧急情况，也不提供医疗、心理、法律或财务诊断。</p>`}else{result.innerHTML=`<section class="summary"><p class="summary-label">先看清发生了什么</p><h2>${escapeHtml(answer.situationSummary)}</h2></section><div class="factors">${answer.factors.map(f=>`<article class="factor"><span class="factor-group">${groupLabels[f.group_id]}</span><h3>${escapeHtml(f.name_zh)}</h3><p>${escapeHtml(f.plain_meaning)}</p><p class="why"><strong>为什么适用：</strong>${escapeHtml(f.why_it_helps)}</p></article>`).join("")}</div>${practiceHtml(answer.practiceSteps)}<section class="basis"><h2>佛法依据</h2><p>${escapeHtml(answer.buddhistBasis)}</p></section><p class="disclaimer">提示：“现在这样练”中的具体步骤是现代生活化建议，不是经文原句。</p><button id="deep-button" class="secondary">我想看更多</button><div id="deep-target"></div>${sourceHtml(answer.sourceIds)}`;document.querySelector("#deep-button").addEventListener("click",e=>{document.querySelector("#deep-target").innerHTML=deepHtml(answer);e.currentTarget.remove()})}result.classList.remove("hidden");result.scrollIntoView({behavior:"smooth",block:"start"});saveHistory(answer.input)}
    function submit(){const input=q.value.trim();if(!input){error.textContent="请先写下你现在遇到的事。";q.focus();return}error.textContent="";render(makeAnswer(input))}
    function getHistory(){try{return JSON.parse(localStorage.getItem("37-offline-history")||"[]")}catch{return[]}}
    function saveHistory(input){try{localStorage.setItem("37-offline-history",JSON.stringify(unique([input,...getHistory()]).slice(0,3)));renderHistory()}catch{}}
    function renderHistory(){const items=getHistory(),box=document.querySelector("#history"),host=document.querySelector("#history-items");if(!items.length){box.classList.add("hidden");return}host.innerHTML=items.map(x=>`<button data-history="${escapeHtml(x)}">${escapeHtml(x)}</button>`).join("");host.querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{q.value=b.dataset.history;submit()}));box.classList.remove("hidden")}
    function renderBrowse(){const host=document.querySelector("#browse-list");host.innerHTML=Object.entries(groupLabels).map(([id,label])=>`<section class="browse-group"><h3>${label}</h3><div class="names">${factors.filter(f=>f.group_id===id).sort((a,b)=>a.order-b.order).map(f=>escapeHtml(f.name_zh)).join(" · ")}</div></section>`).join("")}
    document.querySelectorAll("[data-example]").forEach(b=>b.addEventListener("click",()=>{q.value=b.dataset.example;q.focus()}));document.querySelector("#submit").addEventListener("click",submit);q.addEventListener("keydown",e=>{if((e.metaKey||e.ctrlKey)&&e.key==="Enter")submit()});renderBrowse();renderHistory();
  })();
